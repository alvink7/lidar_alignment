# cloud_aligner parameters
# Edit here instead of in Python. Loaded by align.launch into the node's
# private namespace (~param). Anything not listed falls back to the in-code
# defaults in alignment_core.AlignParams.

# ---- topics & I/O ----
reference_pcd: "~/catkin_ws/maps/reference_jul1.pcd"
input_topic: "/cloud_registered"
output_topic: "/target_to_reference"
matrix_topic: "/target_to_reference_matrix"

# ---- frame names ----
reference_frame: "reference_map"
# target_frame: ""   # leave unset to read from incoming message header

# ---- accumulation ----
# Number of incoming frames to merge before aligning once.
# Raise if the first frames are too sparse for a reliable alignment.
num_frames: 50

# ---- pipeline tuning (override AlignParams) ----
# Global registration
RANSAC_VOXEL: 0.30        # smaller -> more FPFH features/correspondences, slower
TEASER_NOISE_BOUND: 0.60  # max correspondence error (m); ~ RANSAC_VOXEL * 2

# Ground handling
GROUND_REMOVE_Z: 0.30     # points below this (after levelling) treated as ground

# ICP refinement
ICP_VOXEL: 0.10
ICP_DIST_COARSE: 0.5
ICP_DIST_FINE: 0.1

# ---- static TF broadcast (Option 1) ----
# Broadcasts reference_frame -> odom_parent_frame so FAST-LIO's odometry
# composes into the reference frame via TF. Set false to publish topics only.
broadcast_tf: true
# FAST-LIO's odometry parent frame (its camera_init / odom frame name).
odom_parent_frame: "camera_init"
